<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Login Form</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            background: #fff4f4;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(50px, 1fr));
            gap: 2px;
            overflow: hidden;
        }

        .square {
            width: 100%;
            height: 100%;
            background-color: #b7b0b0;
            transition: background-color 0.3s ease;
        }

        .square:hover {
            background-color: #0343ba;
        }

        .content {
            position: relative;
            z-index: 2;
            background: #fff9f9;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 300px;
        }

        .content h2 {
            margin: 0 0 20px;
            font-size: 24px;
            color: #000000;
        }

        .inputBox {
            position: relative;
            margin: 20px 0;
            width: 100%;
        }

        .inputBox input {
            width: 100%;
            padding: 10px;
            background: #ffffff;
            border: none;
            outline: 1px solid black;
            color: #000;
            border-radius: 5px;
            font-size: 16px;
        }

        .inputBox i {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            color: #888;
            font-style: normal;
            transition: 0.5s;
        }

        .inputBox input:focus + i,
        .inputBox input:valid + i {
            top: -10px;
            left: 5px;
            font-size: 12px;
            color: #090a09;
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            width: 100%;
        }

        .links a {
            color: #020202;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background: #080808;
            border: none;
            outline: none;
            color: #f0f0f0;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #0343ba;
        }

        @media (max-width: 600px) {
            .content {
                padding: 20px;
                min-width: 250px;
            }
        }
    </style>
</head>
<body>
    <section class="signin">
        <div class="content">
            <h2>Sign In</h2>
            <div class="form">
                <div class="inputBox">
                    <input type="text" required>
                    <i>Username</i>
                </div>
                <div class="inputBox">
                    <input type="password" required>
                    <i>Password</i>
                </div>
                <div class="links">
                    <a href="#">Forgot Password</a>
                    <a href="#">Signup</a>
                </div>
                <div class="inputBox">
                    <input type="submit" value="Login">
                </div>
            </div>
        </div>
    </section>
    <div class="background" id="background"></div>

    <script>
        function createSquares() {
            const background = document.getElementById('background');
            const squareSize = 50; // Tamaño de cada cuadrado
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            const columns = Math.ceil(screenWidth / squareSize);
            const rows = Math.ceil(screenHeight / squareSize);

            background.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
            background.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

            for (let i = 0; i < columns * rows; i++) {
                const square = document.createElement('div');
                square.classList.add('square');
                background.appendChild(square);
            }
        }

        window.addEventListener('resize', () => {
            const background = document.getElementById('background');
            background.innerHTML = '';
            createSquares();
        });

        createSquares();
    </script>
</body>
</html>
