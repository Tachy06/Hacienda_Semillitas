{% extends 'base.html' %}
{% load static %}
{% load pwa %}
{% block title %} <title>Modificar productos</title> {% endblock %}
{% block content %}
<section class="view_products">
    <div class="container">
        <h1 class="text-center mt-5">Modificar productos</h1>
        <div class="card" style="margin-bottom: 50px;">
            <div class="card-body">
                <form action="{% url 'Modify-product' product.id %}" method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="product" class="form-label">Nombre del producto</label>
                        <input type="text" class="form-control" id="product" name="product" value="{{product.name}}">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Descripción</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{product.description}}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Precio</label>
                        <input type="number" class="form-control" id="price" name="price" value="{{product.price}}">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Modificar</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
